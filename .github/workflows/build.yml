name: Build AviateClone v10 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Estrai il codice sorgente dallo ZIP
        run: |
          echo "Estrazione di AviateClone_v10_SmartML.zip..."
          unzip -o AviateClone_v10_SmartML.zip

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accetta licenze SDK
        run: yes | sdkmanager --licenses || true

      - name: Installa componenti SDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Fix e Allineamento Dipendenze Gradle
        run: |
          GRADLEW_PATH=$(find . -name gradlew)
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          
          echo "Forzo i repository Google e Maven nei file build.gradle..."
          # Integra i repo fondamentali se mancano
          sed -i 's/repositories {/repositories { google(); mavenCentral();/g' build.gradle 2>/dev/null || true
          sed -i 's/repositories {/repositories { google(); mavenCentral();/g' app/build.gradle 2>/dev/null || true
          
          # Se presente un settings.gradle con dependencyResolutionManagement, forzo anche lì
          if [ -f "settings.gradle" ]; then
            sed -i 's/repositories {/repositories { google(); mavenCentral();/g' settings.gradle || true
          fi

      - name: Esegui la Build dell'APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew)
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          chmod +x ./gradlew
          # Puliamo la cache locale precedente per evitare conflitti e compiliamo
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Trova e carica l'APK generato
        uses: actions/upload-artifact@v4
        with:
          name: AviateClone-v10-debug
          path: |
            **/build/outputs/apk/debug/*.apk
          retention-days: 14
