name: Build AviateClone v10 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Estrai il codice sorgente dallo ZIP
        run: |
          echo "Estrazione di AviateClone_v10_SmartML.zip in corso..."
          unzip -o AviateClone_v10_SmartML.zip
          echo "Contenuto estratto:"
          ls -la

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accetta licenze SDK
        run: yes | sdkmanager --licenses || true

      - name: Installa componenti SDK
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Trova ed esegui gradlew
        run: |
          GRADLEW_PATH=$(find . -name gradlew)
          if [ -z "$GRADLEW_PATH" ]; then
            echo "ERRORE: gradlew non trovato nemmeno dopo l'estrazione dello ZIP!"
            exit 1
          fi
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          echo "Trovato gradlew in: $DIR_PATH"
          cd "$DIR_PATH"
          chmod +x ./gradlew
          ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Trova e carica l'APK generato
        uses: actions/upload-artifact@v4
        with:
          name: AviateClone-v10-debug
          path: |
            **/build/outputs/apk/debug/*.apk
          retention-days: 14
