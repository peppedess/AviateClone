name: Build AviateClone v10 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# Questo dice a GitHub di eseguire tutti i comandi dentro la sottocartella del progetto
defaults:
  run:
    working-directory: AviateFixed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          # Specifichiamo il percorso del file di build per il sistema di cache
          build-root-directory: AviateFixed

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK components
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --no-daemon

      - name: Upload Debug APK
         # Nota: usiamo v4 senza il path della sottocartella perché lavora già lì dentro
        uses: actions/upload-artifact@v4
        with:
          name: AviateClone-v10-debug
          path: AviateFixed/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
