name: Build AviateClone v10 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Estrai il codice sorgente dallo ZIP
        run: |
          echo "Estrazione di AviateClone_v10_SmartML.zip..."
          unzip -o AviateClone_v10_SmartML.zip

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accetta licenze SDK
        run: yes | sdkmanager --licenses || true

      - name: Installa componenti SDK e Android 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Generazione Stub API Nascoste (AppPrediction)
        run: |
          # Cerchiamo dove si trova la cartella principale del codice sorgente dell'app
          APP_PATH=$(find . -name "MainActivity.kt" -o -name "MainActivity.java" | head -n 1)
          SRC_MAIN_DIR=$(echo "$APP_PATH" | sed 's/\/java\/.*//' | sed 's/\/kotlin\/.*//')
          
          # Se non la trova di default, proviamo a forzare il percorso standard
          if [ -z "$SRC_MAIN_DIR" ]; then
            SRC_MAIN_DIR="AviateFixed/app/src/main"
          fi
          
          STUB_DIR="$SRC_MAIN_DIR/java/android/app/prediction"
          echo "Creazione degli stub in: $STUB_DIR"
          mkdir -p "$STUB_DIR"
          
          # Creiamo il file finto per AppTarget
          cat << 'EOF' > "$STUB_DIR/AppTarget.java"
          package android.app.prediction;
          import android.os.Parcelable;
          public final class AppTarget implements Parcelable {
              public int describeContents() { return 0; }
              public void writeToParcel(android.os.Parcel dest, int flags) {}
              public AppTargetId getId() { return null; }
              public String getPackageName() { return ""; }
              public String getClassName() { return ""; }
              public android.os.UserHandle getUser() { return null; }
          }
          EOF

          # Creiamo il file finto per AppTargetId
          cat << 'EOF' > "$STUB_DIR/AppTargetId.java"
          package android.app.prediction;
          import android.os.Parcelable;
          public final class AppTargetId implements Parcelable {
              public int describeContents() { return 0; }
              public void writeToParcel(android.os.Parcel dest, int flags) {}
              public String getId() { return ""; }
          }
          EOF

          # Creiamo il file finto per AppTargetEvent
          cat << 'EOF' > "$STUB_DIR/AppTargetEvent.java"
          package android.app.prediction;
          import android.os.Parcelable;
          public final class AppTargetEvent implements Parcelable {
              public static final int ACTION_LAUNCH = 1;
              public static final int ACTION_DISMISS = 2;
              public int describeContents() { return 0; }
              public void writeToParcel(android.os.Parcel dest, int flags) {}
              public AppTarget getTarget() { return null; }
              public int getAction() { return 0; }
              public static final class Builder {
                  public Builder(AppTarget target, int action) {}
                  public AppTargetEvent build() { return null; }
              }
          }
          EOF

          echo "Stub generati con successo!"
          ls -la "$STUB_DIR"

      - name: Esegui la Build dell'APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew)
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Trova e carica l'APK generato
        uses: actions/upload-artifact@v4
        with:
          name: AviateClone-v10-debug
          path: |
            **/build/outputs/apk/debug/*.apk
          retention-days: 14
