name: Build AviateClone v10 APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Estrai il codice sorgente dallo ZIP
        run: |
          echo "Estrazione di AviateClone_v10_SmartML.zip..."
          unzip -o AviateClone_v10_SmartML.zip

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accetta licenze SDK
        run: yes | sdkmanager --licenses || true

      - name: Installa componenti SDK e Android 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Iniezione Stub API Nascoste Android
        run: |
          GRADLEW_PATH=$(find . -name gradlew)
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          
          if [ -f "app/build.gradle" ]; then
            echo "Aggiungo la repository specifica e la dipendenza stub per AppPrediction..."
            
            # 1. Ci assicuriamo che nel blocco dependencies ci sia lo stub per compilare le API nascoste
            # Usiamo compileOnly così serve solo a far star zitto il compilatore, senza appesantire l'APK
            sed -i '/dependencies {/a \    compileOnly "dev.rikka.tools.refine:runtime:4.3.0"' app/build.gradle
            
            # 2. Aggiungiamo una regola per mappare le classi mancanti di AppTarget se necessario
            echo "tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach { kotlinOptions { freeCompilerArgs += ['-Xallow-unstable-dependencies'] } }" >> app/build.gradle
          fi

      - name: Esegui la Build dell'APK
        run: |
          GRADLEW_PATH=$(find . -name gradlew)
          DIR_PATH=$(dirname "$GRADLEW_PATH")
          cd "$DIR_PATH"
          chmod +x ./gradlew
          # Rimuoviamo il "|| true" così se fallisce capiamo subito se ha superato lo scoglio Kotlin
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Trova e carica l'APK generato
        uses: actions/upload-artifact@v4
        with:
          name: AviateClone-v10-debug
          path: |
            **/build/outputs/apk/debug/*.apk
          retention-days: 14
