name: Build AviateClone APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Configura JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accetta licenze SDK
        run: yes | sdkmanager --licenses || true

      - name: Installa componenti SDK e Android 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Esegui la Build dell'APK
        run: |
          chmod +x ./gradlew
          ./gradlew clean assembleDebug --stacktrace --no-daemon

      - name: Trova e carica l'APK generato
        uses: actions/upload-artifact@v4
        with:
          name: AviateClone-debug
          path: |
            **/build/outputs/apk/debug/*.apk
          retention-days: 14
